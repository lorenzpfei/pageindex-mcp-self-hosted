services:
  pageindex-mcp:
    build: .
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - PAGEINDEX_DATA_DIR=/data
      - PORT=8000
    # Cap memory so a heavy ingest can only OOM this container (which restarts
    # and re-queues its work) instead of pushing the whole host into the global
    # OOM killer and taking neighbouring containers down with it.
    mem_limit: 2g
    volumes:
      # Dokploy re-clones the repo into the code dir on every deploy; ../files
      # is its stable per-app storage dir. For plain local use, ../files simply
      # ends up next to the repo checkout - also fine.
      - ../files/data:/data
    networks:
      - dokploy-network
    # For local use without Dokploy/Traefik, remove the networks section above
    # and uncomment this instead (bound to localhost only - the bearer token
    # would otherwise travel unencrypted over plain HTTP):
    # ports:
    #   - "127.0.0.1:8000:8000"
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3

networks:
  dokploy-network:
    external: true
